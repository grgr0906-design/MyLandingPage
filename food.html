      <h1>부산에서 꼭 먹어봐야 할 맛집</h1>
      <p>돼지국밥, 밀면, 해산물, 카페까지 부산 여행 중 쉽게 경험할 수 있는 로컬 음식을 소개합니다.</p>

      <div class="grid">
        <article class="card">
          <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=900&q=80" alt="Korean soup">
          <div class="card-body">
            <h3>돼지국밥</h3>
            <p>부산의 대표 한 끼, 뜨끈한 국물과 밥으로 든든하게 채워줍니다.</p>
          </div>
        </article>
        <article class="card">
          <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=900&q=80" alt="Cold noodles">
          <div class="card-body">
            <h3>밀면</h3>
            <p>시원하고 쫄깃한 국수로 여름 여행에 딱 맞는 메뉴입니다.</p>
          </div>
        </article>
        <article class="card">
          <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=900&q=80" alt="Seafood platter">
          <div class="card-body">
            <h3>해산물</h3>
            <p>광안리와 자갈치 시장에서 신선한 회와 해물을 즐겨보세요.</p>
          </div>
        </article>
