<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시판 | Busan Vibes</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <header class="site-header" role="banner">
    <a href="index.html" class="site-title" data-ko="Busan Vibes" data-en="Busan Vibes" data-fr="Busan Vibes">Busan Vibes</a>
    <nav class="site-nav" role="navigation" aria-label="Main navigation">
      <a href="index.html" target="_blank" rel="noopener noreferrer" data-ko="홈" data-en="Home" data-fr="Accueil">홈</a>
      <a href="places.html" target="_blank" rel="noopener noreferrer" data-ko="명소" data-en="Places" data-fr="Lieux">명소</a>
      <a href="food.html" target="_blank" rel="noopener noreferrer" data-ko="맛집" data-en="Food" data-fr="Restauration">맛집</a>
      <a href="tips.html" target="_blank" rel="noopener noreferrer" data-ko="여행 팁" data-en="Tips" data-fr="Conseils">여행 팁</a>
      <a href="board.html" class="active" target="_blank" rel="noopener noreferrer" data-ko="게시판" data-en="Board" data-fr="Forum">게시판</a>
      <a href="map.html" target="_blank" rel="noopener noreferrer" data-ko="지도" data-en="Map" data-fr="Carte">지도</a>
      <button class="icon-btn secondary login-toggle" type="button" id="loginBtn" aria-haspopup="dialog" aria-expanded="false" aria-label="Login">
        <span class="sr-only" data-ko="로그인" data-en="Login" data-fr="Connexion">Login</span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </button>
      <button class="lang-toggle" type="button" id="langBtn" aria-haspopup="true" aria-expanded="false">English</button>
      <div class="lang-menu" id="langMenu" role="menu" aria-hidden="true">
        <button class="lang-option" type="button" data-lang="ko" role="menuitem">한국어</button>
        <button class="lang-option" type="button" data-lang="en" role="menuitem">English</button>
        <button class="lang-option" type="button" data-lang="fr" role="menuitem">Français</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="section">
      <div class="wrap">
        <div class="section-head">
          <div>
            <p class="eyebrow" data-ko="게시판" data-en="Board" data-fr="Forum">게시판</p>
            <h1 data-ko="부산 여행 후기와 팁을 공유해 보세요" data-en="Share Busan trip notes and tips" data-fr="Partagez vos impressions et conseils sur Busan">부산 여행 후기와 팁을 공유해 보세요</h1>
          </div>
          <p data-ko="간단한 제목과 내용을 입력하면 Supabase 게시판에 저장됩니다." data-en="Enter a short title and message to save to the Supabase board." data-fr="Entrez un titre et un message courts pour l'enregistrer dans le forum Supabase.">간단한 제목과 내용을 입력하면 Supabase 게시판에 저장됩니다.</p>
        </div>

        <div class="board-grid">
          <form id="boardForm" class="board-form" aria-label="Travel board form">
            <label>
              <span data-ko="제목" data-en="Title" data-fr="Titre">제목</span>
              <input id="boardTitle" type="text" name="title" required placeholder="부산 여행의 기억을 한 줄로 남겨보세요" data-ko-placeholder="부산 여행의 기억을 한 줄로 남겨보세요" data-en-placeholder="Leave a short memory from your Busan trip" data-fr-placeholder="Laissez un bref souvenir de votre voyage à Busan">
            </label>
            <label>
              <span data-ko="작성자" data-en="Author" data-fr="Auteur">작성자</span>
              <input id="boardAuthor" type="text" name="author" required placeholder="이름을 입력하세요" data-ko-placeholder="이름을 입력하세요" data-en-placeholder="Enter your name" data-fr-placeholder="Entrez votre nom">
            </label>
            <label>
              <span data-ko="내용" data-en="Content" data-fr="Contenu">내용</span>
              <textarea id="boardContent" name="content" rows="6" required placeholder="부산에서 좋았던 장소나 팁을 공유해보세요" data-ko-placeholder="부산에서 좋았던 장소나 팁을 공유해보세요" data-en-placeholder="Share places or tips you liked in Busan" data-fr-placeholder="Partagez des lieux ou conseils appréciés à Busan"></textarea>
            </label>
            <button class="btn btn-primary" type="submit" data-ko="게시물 작성" data-en="Post" data-fr="Publier">게시물 작성</button>
          </form>

          <div class="board-feed">
            <div class="board-preview">
              <h3>게시물 목록</h3>
              <p id="boardWarning" class="board-warning" aria-live="polite"></p>
              <p id="boardHelp" class="board-help" aria-live="polite"></p>
              <p id="boardStatus" class="board-status">로딩 중...</p>
            </div>
            <div id="boardList" class="board-list"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">© 2026 Busan Vibes. 부산 여행 가이드.</footer>

  <script src="lang.js"></script>
  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.0/dist/umd/supabase.min.js"></script>
  <script>
    const boardForm = document.querySelector("#boardForm");
    const boardList = document.querySelector("#boardList");
    const boardStatus = document.querySelector("#boardStatus");
    const boardWarning = document.getElementById('boardWarning');
    const boardHelp = document.getElementById('boardHelp');
    let supabaseClient = null;
    const isLocalFile = window.location.protocol === 'file:';

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function loadBoardPosts() {
      if (!supabaseClient) return;
      boardStatus.textContent = "로딩 중...";

      const { data, error } = await supabaseClient
        .from("posts")
        .select("id,title,author,content,created_at")
        .order("created_at", { ascending: false })
        .limit(20);

      if (error) {
        const message = error.message || error.details || "오류가 발생했습니다.";
        boardStatus.textContent = `게시물을 불러오는 중 오류가 발생했습니다: ${message}`;
        console.error("Supabase load error:", error);
        return;
      }

      if (!data || !data.length) {
        boardStatus.textContent = "아직 게시물이 없습니다.";
        boardList.innerHTML = "";
        return;
      }

      boardStatus.textContent = "";
      boardList.innerHTML = data.map((post) => {
        const date = new Date(post.created_at).toLocaleDateString("ko-KR", {
          year: "numeric",
          month: "short",
          day: "numeric"
        });

        return `
          <article class="board-card">
            <div class="board-card-header">
              <strong>${escapeHtml(post.title)}</strong>
              <time datetime="${post.created_at}">${date}</time>
            </div>
            <p class="board-author">${escapeHtml(post.author)}</p>
            <p>${escapeHtml(post.content)}</p>
          </article>
        `;
      }).join("");
    }

    async function submitBoardPost(event) {
      event.preventDefault();

      if (!supabaseClient) {
        boardStatus.textContent = "게시판 설정을 확인하세요.";
        return;
      }

      const title = document.querySelector("#boardTitle").value.trim();
      const author = document.querySelector("#boardAuthor").value.trim();
      const content = document.querySelector("#boardContent").value.trim();

      if (!title || !author || !content) {
        boardStatus.textContent = "모든 항목을 입력해주세요.";
        return;
      }

      boardStatus.textContent = "게시물 등록 중...";
      boardWarning.textContent = "";
      const { error } = await supabaseClient
        .from("posts")
        .insert([{ title, author, content }]);

      if (error) {
        const message = error.message || error.details || "오류가 발생했습니다.";
        boardStatus.textContent = `게시물 등록 중 오류가 발생했습니다: ${message}`;
        console.error("Supabase insert error:", error);

        if (error.status === 401 || error.status === 403) {
          boardWarning.textContent = "Supabase 테이블에 INSERT 권한이 없습니다. Supabase 콘솔에서 posts 테이블의 Row Level Security를 확인하고 public INSERT 정책을 추가하세요.";
          if (boardHelp) boardHelp.textContent = "public INSERT 정책이 없으면 익명 키로 쓰기가 차단됩니다.";
        }
        return;
      }

      boardForm.reset();
      boardStatus.textContent = "게시물이 등록되었습니다.";
      loadBoardPosts();
    }

    function initBoard() {
      const boardWarning = document.getElementById('boardWarning');
      if (isLocalFile) {
        const warningMessage = "로컬 파일(file://)에서는 Supabase 요청이 제한될 수 있습니다. 터미널에서 로컬 서버를 실행한 뒤 http://localhost 로 접속하세요.";
        if (boardWarning) boardWarning.textContent = warningMessage;
        const submitButton = boardForm.querySelector('button[type="submit"]');
        if (submitButton) submitButton.disabled = true;
        return;
      }

      if (!window.SUPABASE_CONFIG || !window.SUPABASE_CONFIG.url || !window.SUPABASE_CONFIG.anonKey) {
        boardStatus.textContent = "Supabase 설정이 필요합니다.";
        if (boardWarning) boardWarning.textContent = "supabase-config.js 파일에 URL과 anon 키가 있는지 확인하세요.";
        if (boardHelp) boardHelp.textContent = "Supabase 프로젝트에서 posts 테이블에 public INSERT 정책을 추가해야 합니다.";
        return;
      }

      if (!window.supabase || !window.supabase.createClient) {
        boardStatus.textContent = "Supabase 클라이언트를 불러올 수 없습니다.";
        return;
      }

      console.log('Supabase config', window.SUPABASE_CONFIG);
      supabaseClient = window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey, {
        auth: { persistSession: false },
        global: {
          headers: {
            apikey: window.SUPABASE_CONFIG.anonKey,
            Authorization: `Bearer ${window.SUPABASE_CONFIG.anonKey}`
          }
        }
      });
      console.log('Supabase client', supabaseClient);
      loadBoardPosts();
    }

    boardForm.addEventListener("submit", submitBoardPost);
    initBoard();
  </script>
</body>
</html>
